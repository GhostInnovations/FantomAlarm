<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="FANTOM app gallery showing map predictions, GPS history and mesh coverage screens.">
  <title>FANTOM | Gallery</title>
  <link rel="shortcut icon" href="/App/images/favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar navbar-dark navbar-expand-lg" aria-label="Primary navigation">
      <div class="container">
        <a class="navbar-brand" href="/">FANTOM</a>
        <button class="navbar-toggler" type="button" onclick="toggleNav()" aria-controls="siteNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
          <span class="sr-only">Toggle navigation</span>
        </button>
        <div class="navbar-collapse collapse" id="siteNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/App/">App</a></li>
            <li class="nav-item"><a class="nav-link" href="/Timeline/">Timeline</a></li>
            <li class="nav-item"><a class="nav-link active" href="/Gallery/">Gallery</a></li>
            <li class="nav-item"><a class="nav-link" href="/#contact">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="gallery-hero">
      <div class="container">
        <p class="eyebrow">Product screens</p>
        <h1>FANTOM app gallery</h1>
        <p>Map views, detection point examples, GPS history and network coverage visuals.</p>
      </div>
    </section>

    <section class="gallery-section">
      <div class="container gallery-grid">
        <figure class="gallery-card wide">
          <img src="/assets/images/PolyPoints/Base App.png" alt="FANTOM app base screen">
          <figcaption>Base app view</figcaption>
        </figure>
        <figure class="gallery-card">
          <img src="/assets/images/PolyPoints/1PolyPoint.png" alt="One detection point prediction">
          <figcaption>One detection point</figcaption>
        </figure>
        <figure class="gallery-card">
          <img src="/assets/images/PolyPoints/3PolyPoint.png" alt="Three detection point prediction">
          <figcaption>Three detection points</figcaption>
        </figure>
        <figure class="gallery-card">
          <img src="/assets/images/PolyPoints/5PolyPoint.png" alt="Five detection point prediction">
          <figcaption>Five detection points</figcaption>
        </figure>
        <figure class="gallery-card">
          <img src="/assets/images/PolyPoints/7PolyPoint.png" alt="Seven detection point prediction">
          <figcaption>Seven detection points</figcaption>
        </figure>
        <figure class="gallery-card">
          <img src="/assets/images/PolyPoints/GPSHistory.png" alt="GPS history screen">
          <figcaption>GPS history</figcaption>
        </figure>
        <figure class="gallery-card wide">
          <img src="/assets/images/BluetoothMap.png" alt="FANTOM Bluetooth mesh coverage map">
          <figcaption>Bluetooth mesh map</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <div class="gallery-lightbox" id="galleryLightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Expanded gallery image">
    <button class="lightbox-close" type="button" aria-label="Close image view">&times;</button>
    <div class="lightbox-frame">
      <img id="lightboxImage" src="" alt="">
      <p id="lightboxCaption"></p>
    </div>
  </div>

  <script>
    function toggleNav() {
      var nav = document.getElementById('siteNav');
      var toggle = document.querySelector('.navbar-toggler');
      if (!nav) return;
      nav.classList.toggle('collapse');
      if (toggle) {
        toggle.setAttribute('aria-expanded', String(!nav.classList.contains('collapse')));
      }
    }

    (function setupGalleryLightbox() {
      var lightbox = document.getElementById('galleryLightbox');
      var lightboxImage = document.getElementById('lightboxImage');
      var lightboxCaption = document.getElementById('lightboxCaption');
      var closeButton = document.querySelector('.lightbox-close');
      var cards = Array.prototype.slice.call(document.querySelectorAll('.gallery-card'));

      function closeLightbox() {
        lightbox.classList.remove('is-open');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('lightbox-open');
        lightboxImage.removeAttribute('src');
      }

      function openLightbox(card) {
        var image = card.querySelector('img');
        var caption = card.querySelector('figcaption');
        if (!image) return;

        lightboxImage.src = image.currentSrc || image.src;
        lightboxImage.alt = image.alt || '';
        lightboxCaption.textContent = caption ? caption.textContent : '';
        lightbox.classList.add('is-open');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.classList.add('lightbox-open');
        closeButton.focus();
      }

      cards.forEach(function(card) {
        card.setAttribute('tabindex', '0');
        card.setAttribute('role', 'button');
        var cardCaption = card.querySelector('figcaption');
        card.setAttribute('aria-label', 'Open larger image: ' + (cardCaption ? cardCaption.textContent : 'gallery image'));

        card.addEventListener('click', function() {
          openLightbox(card);
        });

        card.addEventListener('keydown', function(event) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            openLightbox(card);
          }
        });
      });

      closeButton.addEventListener('click', closeLightbox);

      lightbox.addEventListener('click', function(event) {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });

      document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape' && lightbox.classList.contains('is-open')) {
          closeLightbox();
        }
      });
    })();
  </script>
</body>
</html>
